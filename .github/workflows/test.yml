name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch when a new commit is pushed.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # `npm install` (not ci) tolerates platform-specific optional deps
        # (e.g. @emnapi/runtime on Linux when lockfile was generated on macOS).
        run: npm install --no-audit --no-fund

      - name: Lint
        # Lint is informational while we burn down pre-existing tech debt
        # (hundreds of `Unexpected any` errors throughout the codebase).
        # Tests + tsc still BLOCK the build on any failure.
        continue-on-error: true
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
        env:
          CI: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports/
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Build evaluates module-level code (e.g. `new Stripe(...)`) when
          # collecting page data, so all env vars consumed at module init
          # must have a non-empty value. Real values are configured per
          # environment in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build-only
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-for-build-only
          STRIPE_SECRET_KEY: sk_test_dummy_for_build_only
          STRIPE_WEBHOOK_SECRET: whsec_dummy_for_build_only
          GOOGLE_AI_API_KEY: dummy-google-ai-key-for-build
          AWS_REGION: eu-central-1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_S3_BUCKET_DOCUMENTS: dummy-bucket
          OBLIO_CLIENT_ID: dummy
          OBLIO_CLIENT_SECRET: dummy
          OBLIO_COMPANY_CIF: '0'
          OBLIO_SERIES_NAME: EGH
          CRON_SECRET: dummy
          RESEND_API_KEY: dummy
          SMSLINK_API_KEY: dummy
