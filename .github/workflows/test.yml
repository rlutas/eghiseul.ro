name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch when a new commit is pushed.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # `npm install` (not ci) tolerates platform-specific optional deps
        # (e.g. @emnapi/runtime on Linux when lockfile was generated on macOS).
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
        env:
          CI: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports/
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Build needs Supabase env to validate types — provide dummy values
          # for CI so the build doesn't crash on missing env. Real env must be
          # configured per environment in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build-only
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-for-build-only
